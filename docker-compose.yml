# Research Intelligence Platform — Single-VM Docker Compose
#
# Required files before `docker compose up`:
#   ./research_platform.db     — SQLite database (volume-mounted)
#   ./embeddings.index         — FAISS index (volume-mounted, read-only)
#   ./embeddings_ids.json      — FAISS ID map (volume-mounted, read-only)
#   ./.hf_cache/               — HuggingFace model (baked into API image)
#   ./.env.production          — secrets file (see .env.example)
#
# Build and start:
#   docker compose --env-file .env.production up -d --build
#
# View logs:
#   docker compose logs -f api
#   docker compose logs -f web

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: rip-api:latest
    restart: unless-stopped
    volumes:
      # SQLite database — writable so WAL journal can be written
      - ./research_platform.db:/data/research_platform.db
      # FAISS index and ID map — read-only, rebuilt offline
      - ./embeddings.index:/data/embeddings.index:ro
      - ./embeddings_ids.json:/data/embeddings_ids.json:ro
    environment:
      DATABASE_URL: "sqlite:////data/research_platform.db"
      LLM_PROVIDER: "${LLM_PROVIDER:-anthropic}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      CORS_ORIGIN: "${CORS_ORIGIN}"
      EMBEDDINGS_INDEX_PATH: "/data/embeddings.index"
      EMBEDDINGS_IDS_PATH: "/data/embeddings_ids.json"
      SEMANTIC_SEARCH: "${SEMANTIC_SEARCH:-true}"
      HF_HUB_OFFLINE: "1"
      HF_HOME: "/app/.hf_cache"
    # Do NOT expose port 8000 to the host — nginx proxies to it internally.
    # Expose only for local debugging by uncommenting:
    # ports:
    #   - "8000:8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Next.js frontend ────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # NEXT_PUBLIC_API_URL is the URL the *browser* uses to reach the API.
        # For a domain deployment this must be the public HTTPS URL.
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://yourdomain.com/api/v1}"
    image: rip-web:latest
    restart: unless-stopped
    # Do NOT expose 3000 — nginx proxies to it.
    # ports:
    #   - "3000:3000"
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      # TLS certificates — obtain with certbot or copy manually
      # Expected paths (see nginx.conf):
      #   /etc/nginx/certs/fullchain.pem
      #   /etc/nginx/certs/privkey.pem
      - ./deploy/certs:/etc/nginx/certs:ro
    networks:
      - internal
    depends_on:
      - api
      - web

networks:
  internal:
    driver: bridge
