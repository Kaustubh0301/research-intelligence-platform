# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name yourdomain.com;          # CHANGE THIS to your domain

    # TLS — populate deploy/certs/ with your certificate and key.
    # With certbot: certbot certonly --standalone -d yourdomain.com
    # then symlink or copy fullchain.pem / privkey.pem here.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — only enable once TLS is confirmed working
    # add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 10m;

    # ── API: SSE streaming endpoint ─────────────────────────────────────────
    # /api/v1/chat/stream uses Server-Sent Events — must disable buffering
    # so tokens reach the browser as they are produced.
    location /api/v1/chat/stream {
        limit_req zone=api burst=5 nodelay;

        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE requires buffering off — without this, tokens are held until
        # the buffer fills and the user sees no streaming effect.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;   # LLM calls can be slow

        # SSE-specific headers
        proxy_set_header   Connection        '';
        chunked_transfer_encoding on;
    }

    # ── API: feature-map analyze (long-running — parallel LLM calls ~55-115s) ──
    # Must appear before the generic /api/ block — nginx uses longest-prefix match.
    location /api/v1/feature-map/analyze {
        limit_req zone=api burst=3 nodelay;

        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;   # N=8 features observed at 114s; 180s gives headroom
    }

    # ── API: all other endpoints ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── API health check (internal — not rate-limited) ───────────────────────
    location = /health {
        proxy_pass http://api:8000/health;
    }

    # ── API docs (consider removing or gating in production) ─────────────────
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
    }

    # ── Next.js frontend ─────────────────────────────────────────────────────
    # Next.js HMR WebSocket (only needed in dev; harmless in prod)
    location /_next/webpack-hmr {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://web:3000;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
